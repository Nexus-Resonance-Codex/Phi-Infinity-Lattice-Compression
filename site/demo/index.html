<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>φ^∞ Lattice Compression Visualizer | Nexus Resonance Codex</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0e;
            --accent-gold: #FFD700;
            --accent-cyan: #00F0FF;
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --phi: 1.618033988749895;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Hero Header */
        header {
            width: 100%;
            padding: 2rem;
            z-index: 10;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            animation: pulse-glow 4s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.3)); }
            100% { filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.8)); }
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem;
            z-index: 2;
        }

        .visualizer-container {
            position: relative;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Glassmorphism Control Panel */
        .controls {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            overflow-y: auto;
            max-height: 80vh;
        }

        .section-title {
            font-weight: 500;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 1rem;
            border-left: 4px solid var(--accent-gold);
        }

        .metric-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-top: 0.3rem;
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.8rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(0, 240, 255, 0.2));
            color: #fff;
            border: 1px solid var(--accent-cyan);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(0, 240, 255, 0.4));
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        .status-footer {
            padding: 1rem 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        .indicator {
            width: 8px;
            height: 8px;
            background-color: var(--accent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">φ^∞ LATTICE MANIFOLD</div>
    </header>

    <main>
        <div class="visualizer-container">
            <canvas id="latticeCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="section-title">Lattice Parameters</div>
            
            <div class="control-group">
                <label>Projection Dimension <span id="dim-val">8192</span></label>
                <input type="range" id="dim-slider" min="256" max="16384" step="256" value="8192">
            </div>

            <div class="control-group">
                <label>QRT Damping <span id="qrt-val">0.382</span></label>
                <input type="range" id="qrt-slider" min="0" max="1" step="0.01" value="0.38">
            </div>

            <div class="control-group">
                <label>Lattice Spin Speed <span id="spin-val">1.0</span></label>
                <input type="range" id="spin-slider" min="0" max="5" step="0.1" value="1.0">
            </div>

            <div class="section-title">Resonance Sandbox</div>
            
            <div class="control-group">
                <label>Input Sequence (Text/Data)</label>
                <textarea id="sandbox-input" placeholder="Enter text to project into the lattice..."></textarea>
            </div>

            <button id="project-btn">Project Into Manifold</button>

            <div class="section-title">Live Metrics</div>
            
            <div class="metric-card">
                <div class="metric-title">Coarse Lattice Anchor</div>
                <div class="metric-value" id="anchor-id">0x0000</div>
            </div>
            
            <div class="metric-card" style="border-left-color: var(--accent-cyan);">
                <div class="metric-title">Context Shard Density</div>
                <div class="metric-value" id="shard-val">0.0000</div>
            </div>

            <div class="metric-card" style="border-left-color: #ff3366;">
                <div class="metric-title">Reconstruction Stability</div>
                <div class="metric-value" id="stability-val">100.00%</div>
            </div>
        </div>
    </main>

    <footer class="status-footer">
        <div class="indicator"></div>
        <span>PHASE: OPS-READY | TTT MODULAR SYNC: OK | QRT STATUS: STABLE</span>
    </footer>

    <script>
        const PHI = 1.618033988749895;
        const GOLDEN_ANGLE = 2.39996322972865332;
        
        const canvas = document.getElementById('latticeCanvas');
        const ctx = canvas.getContext('2d');
        const container = canvas.parentElement;
        let width, height, cx, cy;

        function resize() {
            width = canvas.width = container.clientWidth;
            height = canvas.height = container.clientHeight;
            cx = width / 2;
            cy = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Control Elements
        const dimSlider = document.getElementById('dim-slider');
        const qrtSlider = document.getElementById('qrt-slider');
        const spinSlider = document.getElementById('spin-slider');
        const dimVal = document.getElementById('dim-val');
        const qrtVal = document.getElementById('qrt-val');
        const spinVal = document.getElementById('spin-val');
        const projectBtn = document.getElementById('project-btn');
        const sandboxInput = document.getElementById('sandbox-input');

        let targetDim = 8192;
        let qrtDamping = 0.38;
        let spinSpeed = 1.0;

        dimSlider.oninput = () => { targetDim = parseInt(dimSlider.value); dimVal.innerText = targetDim; initLattice(); };
        qrtSlider.oninput = () => { qrtDamping = parseFloat(qrtSlider.value); qrtVal.innerText = qrtDamping.toFixed(3); };
        spinSlider.oninput = () => { spinSpeed = parseFloat(spinSlider.value); spinVal.innerText = spinSpeed.toFixed(1); };

        class LatticeNode {
            constructor(index) {
                this.index = index;
                this.theta = this.index * GOLDEN_ANGLE;
                this.baseR = Math.sqrt(this.index) * 5;
                this.r = this.baseR;
                this.x = cx;
                this.y = cy;
                this.phase = Math.random() * Math.PI * 2;
                this.freq = (1 / PHI) * (0.01 + Math.random() * 0.02);
                this.hue = this.index % 2 === 0 ? 50 : 180;
                this.opacity = 0.3 + 0.7 * Math.exp(-this.index / 2000);
            }

            update(time, tension) {
                let r = this.baseR;
                if (tension > 0) {
                    r = this.baseR * (1 - tension * 0.5 * (1 + Math.sin(time * this.freq + this.phase)));
                }

                this.theta += 0.001 * PHI * spinSpeed;
                const tx = cx + r * Math.cos(this.theta);
                const ty = cy + r * Math.sin(this.theta);
                this.x += (tx - this.x) * 0.1;
                this.y += (ty - this.y) * 0.1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.opacity})`;
                ctx.fill();
            }
        }

        let nodes = [];
        function initLattice() {
            nodes = [];
            const count = Math.min(2000, targetDim / 4);
            for (let i = 0; i < count; i++) nodes.push(new LatticeNode(i));
        }
        initLattice();

        let tension = 0;
        let tensionTarget = 0;

        function animate(time) {
            ctx.fillStyle = 'rgba(10, 10, 14, 0.2)';
            ctx.fillRect(0, 0, width, height);

            tension += (tensionTarget - tension) * 0.05;
            if (tensionTarget > 0) tensionTarget -= 0.01;
            if (tensionTarget < 0) tensionTarget = 0;

            nodes.forEach(node => {
                node.update(time, tension);
                node.draw();
            });

            // Draw connecting lines for central resonance
            ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 + tension * 0.4})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            for (let i = 0; i < Math.min(100, nodes.length); i++) {
                ctx.lineTo(nodes[i].x, nodes[i].y);
            }
            ctx.stroke();

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        projectBtn.onclick = () => {
            const text = sandboxInput.value;
            if (!text) return;

            tensionTarget = 1.0;
            
            // Simulate HRE Projection
            let sum = 0;
            for(let i=0; i<text.length; i++) sum += text.charCodeAt(i);
            const anchor = (sum % 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
            document.getElementById('anchor-id').innerText = `0x${anchor}`;
            
            const shardVal = (sum / 10000 * PHI).toFixed(4);
            document.getElementById('shard-val').innerText = shardVal;
            
            const stabilityVal = (99.99 + Math.random() * 0.01).toFixed(2);
            document.getElementById('stability-val').innerText = `${stabilityVal}%`;

            projectBtn.innerText = "PROJECTED";
            setTimeout(() => { projectBtn.innerText = "PROJECT INTO MANIFOLD"; }, 2000);
        };
    </script>
</body>
</html>
