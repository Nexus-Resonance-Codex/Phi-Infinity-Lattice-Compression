# ==============================================================================
# NRC φ^∞ Lattice Compression Engine - Pre-Commit Configuration
# ==============================================================================
# Ensures absolute maximal static safety and formatting consistency 
# prior to any git commit.
default_stages: [pre-commit]
fail_fast: true

repos:
  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=50000'] # Allow larger model mockups if necessary, but warn

  # Python Formatting (Black)
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        args: ["--line-length=79"]

  # Python Linting (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Python Static Type Checking (Mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-requests", "types-PyYAML", "numpy", "mpmath", "torch"]
        args: ["--strict"]
