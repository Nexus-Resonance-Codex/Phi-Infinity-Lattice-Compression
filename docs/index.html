<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=demo/index.html">
    <title>φ^∞ Lattice Compression | Nexus Resonance Codex</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0e;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 16px;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
        }
        h1 {
            background: linear-gradient(90deg, #FFD700, #00F0FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #aaa;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top: 3px solid #00F0FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #00F0FF;
            text-decoration: none;
            font-weight: 700;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
