name: NRC φ^∞ Lattice Compression CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test-and-lint:
    name: Core Integrity Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Formatting Check
      run: cargo fmt -- --check

    - name: Rust Clippy
      run: cargo clippy -- -D warnings

    - name: Rust Tests
      run: cargo test --verbose

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        uv venv .venv
        # Need CPU specific version of PyTorch for CI runner
        uv pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio 
        uv pip install -e .[dev]

    - name: Python Formatting Check (Ruff)
      run: uv run ruff format --check phi_infinity_lattice_compression/ tests/

    - name: Python Linting Check (Ruff)
      run: |
        uv run ruff check phi_infinity_lattice_compression/ tests/

    - name: Static Type Checking (Mypy)
      run: |
        uv run mypy phi_infinity_lattice_compression/ tests/

    - name: Run Pytest
      run: |
        uv run pytest tests/ --maxfail=1 --disable-warnings -v
